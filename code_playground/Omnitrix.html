<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnitrix Recreation</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
    }
    .outer_con {
      height: 400px;
      width: 400px;
      border: 20px solid black;
      background-color: #23e023;
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 180px;
      cursor: pointer;
    }
    .square {
      height: 300px;
      width: 300px;
      background-color: black;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* Active state */
    .outer_con.active {
      background-color: white;
    }
    .outer_con.active .square {
      background-color: gray;
      border: 10px solid black;
    }
    .outer_con.active ~ body {
      background-color: black;
    }
  </style>
</head>
<body>
  <div class="outer_con" id="outer_con">
    <div class="square"></div>
    <div class="square"></div>
  </div>

  <script>
    const ring = document.getElementById("outer_con");
    ring.addEventListener("click", () => {
      document.body.style.backgroundColor = 
        ring.classList.toggle("active") ? "black" : "white";
    });
  </script>
</body>
</html>
