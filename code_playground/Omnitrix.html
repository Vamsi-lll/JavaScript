<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnitrix Recreation</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
    }
    .outer_con {
      height: 400px;
      width: 400px;
      border: 20px solid black;
      background-color: #23e023; /* default green */
      border-radius: 50%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 180px;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .square {
      height: 300px;
      width: 300px;
      background-color: black;
      transform: rotate(45deg);
      flex-shrink: 0;
      transition: all 0.3s;
    }

    /* Active state */
    .outer_con.active {
      background-color: white;
    }
    .outer_con.active .square {
      background-color: gray;
      border: 10px solid black;
    }

    /* Flashing animation for deactivation */
    @keyframes flash {
      0%   { background-color: white; }
      50%  { background-color: red; }
      100% { background-color: white; }
    }
    .outer_con.deactivating {
      animation: flash 1s ease-in-out 5; /* 5 cycles = 5 seconds */
    }
  </style>
</head>
<body>
  <div class="outer_con" id="outer_con">
    <div class="square"></div>
    <div class="square"></div>
  </div>

  <script>
    const ring = document.getElementById("outer_con");
    let active = false;

    ring.addEventListener("click", () => {
      if (!active) {
        // Activate
        ring.classList.add("active");
        document.body.style.backgroundColor = "black";
        active = true;
      } else {
        // Start deactivation animation
        ring.classList.remove("active");
        ring.classList.add("deactivating");
        document.body.style.backgroundColor = "white";

        // After 5s animation, reset to default green
        setTimeout(() => {
          ring.classList.remove("deactivating");
          ring.style.backgroundColor = "#23e023";
          active = false;
        }, 3000);
      }
    });
  </script>
</body>
</html>
