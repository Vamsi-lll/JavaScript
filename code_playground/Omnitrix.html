<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnitrix Recreation</title>
  <style>
    body {
      height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      
    }
    .outer_con {
      height: 400px;
      width: 400px;
      border: 20px solid black;
      background-color: #23e023;
      border-radius: 50%;
      overflow: hidden; 
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 180px; /* small gap so they fit */
      cursor: pointer;
    }
    .square {
      height: 300px;
      width: 300px;
      background-color: black;
      transform: rotate(45deg);
      flex-shrink: 0; /* prevents flex from squishing them */
    }
  </style>
</head>
<body>
  <div class="outer_con" id="outer_con">
    <div class="square" id="square1"></div>
    <div class="square" id="square2"></div>
  </div>
  <script>
    const ring = document.getElementById("outer_con")

    let isclicked=true
    ring.addEventListener("click",()=>{
        if (isclicked){

            const square1 = document.getElementById('square1')
            const square2 = document.getElementById('square2')
    
            ring.style.backgroundColor="white"
            square1.style.backgroundColor="gray"
            square1.style.border="10px solid black"
            square2.style.backgroundColor="gray"
            square2.style.border="10px solid black"
    
            document.body.style.backgroundColor="black"
            isclicked=false
        }
        else{
            ring.style.backgroundColor="#23e023"
            square1.style.backgroundColor="black"
            square1.style.border="none"
            square2.style.backgroundColor="black"
            square2.style.border="none"
    
            document.body.style.backgroundColor="white"
            isclicked=true
        }

    })
  </script>
</body>
</html>
